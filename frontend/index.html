<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Intelligence Platform</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="flex items-center gap-sm" style="font-weight: 700; font-size: var(--font-size-lg);">
                    <i data-lucide="layers" class="text-accent"></i>
                    Document AI
                </div>
                
                <input type="file" id="file-upload" accept="application/pdf" style="display: none;">
                <button id="upload-btn" class="btn btn-primary w-full justify-center">
                    <i data-lucide="upload" id="upload-icon"></i>
                    Upload PDF
                </button>
            </div>
            
            <div class="sidebar-content" id="document-list">
                <!-- Document Cards injected here via ui.js -->
            </div>
        </aside>

        <!-- Main Area -->
        <main class="main-area">
            <header class="chat-header">
                <div class="flex items-center">
                    <button id="mobile-menu-btn" class="mobile-menu-btn">
                        <i data-lucide="menu"></i>
                    </button>
                    <div id="chat-header">
                        <!-- Dynamic Header injected here via ui.js -->
                    </div>
                </div>
            </header>
            
            <!-- Empty State -->
            <div id="chat-empty-state" class="empty-state">
                <i data-lucide="messages-square"></i>
                <h2 style="font-weight: 600; font-size: var(--font-size-xl);">Welcome to Document AI</h2>
                <p>Select a document from the sidebar to start chatting, or upload a new one.</p>
            </div>

            <!-- Chat History -->
            <div class="chat-container hidden" id="chat-history">
                <!-- Chat messages injected here via ui.js -->
            </div>
            
            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" class="input-text chat-input" placeholder="Ask a question about this document...">
                    <button id="chat-send-btn" class="chat-send-btn">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Application Logic -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
